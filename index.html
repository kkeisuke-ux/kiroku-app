<meta charset="utf-8">

<title>まいにち きろく(プロトタイプ)</title>
<style>

  .statusbar{ display:flex; justify-content:space-between; font-size:11px; color:#8d887a; padding:8px 18px 0;

  .rail .opt{ min-height:40px; padding:6px 12px; font-size:14.5px; border-radius:12px; }

  .backrow{ margin-top:auto; padding-top:12px; }

  .done{ text-align:center; margin:auto 0; position:relative; }

    padding:10px 16px; font-weight:700; }
  .feedbtn{ display:block; margin:14px auto 0; background:var(--brand); color:#fff; border:none;

  }

<div class="phone">
  <div class="statusbar"><span id="sb-time"></span><span id="sb-day"></span><span>🔋</span></div>
  <div class="app" id="app"></div>
</div>

<script>
(function(){
  'use strict';
  const app=document.getElementById('app');

  /* ============ 学年モード(URLの #g1 / #g23 / #g46 で切替) ============
     g1  = 1年生:時間を聞かない・お金なし・イラスト中心のシンプル版
     g23 = 2〜3年生:ひらがな・時間スロット・お金(コイン)あり(標準)
     g46 = 4〜6年生:g23と同じ内容を、3年生までに習う漢字で表記 */
  const GRADES={g1:'1年生',g23:'2〜3年生',g46:'4〜6年生'};
  let GRADE=(location.hash.replace('#','').split('?')[0]||'g23');
  if(!GRADES[GRADE]) GRADE='g23';
  const G1=GRADE==='g1', G46=GRADE==='g46';
  window.addEventListener('hashchange',()=>location.reload());  /* URLで学年を切替えたら読み直す */

  /* 4〜6年生:3年生までの漢字だけで表記(フレーズ辞書。無いものはそのまま) */
  const KJ={
    'あさの きろく':'朝の きろく','かえりの きろく':'帰りの きろく',
    'きのうの よると きょうの あさの こと':'きのうの 夜と 今日の 朝の こと',
    'きょうの 休みじかんの こと':'今日の 休み時間の こと',
    'わたしの':'わたしの','1しゅうかん':'1週間','こんしゅうの':'今週の','めあて':'目当て',
    'こんしゅうの めあてを きめよう':'今週の 目当てを きめよう',

  /* ============ 回答の取得ヘルパ ============ */
  function ans(dateIso,qid){
    let v=null;
    S.events.forEach(e=>{ if(e.t==='ans'&&e.d===dateIso&&e.q===qid) v=e.a; });  /* 最後の回答が有効 */
    return v;
  }
  function completed(dateIso,sess){ return S.events.some(e=>e.t==='complete'&&e.d===dateIso&&e.s===sess); }
  function weekDates(mon){ const m=fromIso(mon); return Array.from({length:7},(_,i)=>iso(addDays(m,i))); }
  function cntWeek(mon,qid,fn){ let c=0; weekDates(mon).forEach(d=>{ const a=ans(d,qid); if(a!=null&&a!=='DK'&&fn(a)) c++; }); return c; }
  function cntNoSt(mon){ let c=0; weekDates(mon).forEach(d=>{ if(ans(d,'M4')===1) c++; }); return c; }
  function sotoDays(mon){ let c=0; weekDates(mon).forEach(d=>{
    const p=ans(d,'M5a'), k1=ans(d,'K1'), k2=ans(d,'K2');
    if(p===0||p===2||k1===0||k2===0) c++; }); return c; }
  function moveDay(d){ return ans(d,'M5')===0; }
  const avg=x=>x.reduce((a,b)=>a+b,0)/x.length;
  function wakePair(dates){        /* 学校日/休日の起床(時)平均 */
    let sw=[],hw=[];
    dates.forEach(d=>{ const a=ans(d,'M3'); if(a!=null&&a!=='DK'){ (isSchool(fromIso(d))?sw:hw).push(WAKE_H[a]); }
      const h=ans(d,'M3H'); if(h!=null&&h!=='DK') hw.push(WAKE_H[h]); });
    return {sw:sw.length?avg(sw):null, hw:hw.length?avg(hw):null};
  }
  function gapVal(dates){ const p=wakePair(dates); return (p.sw==null||p.hw==null)?null:Math.abs(p.hw-p.sw); }
  function gapOK(mon){ const g=gapVal(weekDates(mon)); return g==null?null:g<=1; }

  /* ---- 期間集計(週・月共通。日付リストを渡す) ---- */
  function avgSlotD(dates,qid,H){ const v=[]; dates.forEach(d=>{const a=ans(d,qid); if(a!=null&&a!=='DK') v.push(H[a]);}); return v.length?avg(v):null; }
  function modeSlotD(dates,qid,SL){ const c={}; dates.forEach(d=>{const a=ans(d,qid); if(a!=null&&a!=='DK') c[a]=(c[a]||0)+1;});
    let best=null,bn=0; Object.keys(c).forEach(k=>{ if(c[k]>bn){bn=c[k];best=k;} }); return best==null?null:SL[best][1]; }
  function durAvgD(dates){ const v=[]; dates.forEach(d=>{const b=ans(d,'M2'),w=ans(d,'M3');
    if(b!=null&&b!=='DK'&&w!=null&&w!=='DK') v.push(WAKE_H[w]+24-BED_H[b]);}); return v.length?avg(v):null; }
  function sotoD(dates){ let c=0; dates.forEach(d=>{const p=ans(d,'M5a'),k1=ans(d,'K1'),k2=ans(d,'K2');
    if(p===0||p===2||k1===0||k2===0) c++;}); return c; }
  function moveDates(dates){ return dates.filter(d=>ans(d,'M5')===0).length; }
  function stOkD(dates){ let ok=0,obs=0; dates.forEach(d=>{ const g=ans(d,'M4');
    if(g===1){ok++;obs++;return;} const a=ans(d,'M4a'); if(a!=null&&a!=='DK'){obs++; if(ST_H[a]<=2) ok++;}}); return {ok,obs}; }
  function starsD(dates){ let n=0; S.events.forEach(e=>{ if(e.t==='star'&&dates.includes((e.at||'').slice(0,10))) n+=e.n; }); return n; }
  function agg(dates){ return {bed:avgSlotD(dates,'M2',BED_H), bedM:modeSlotD(dates,'M2',BED),
    wake:avgSlotD(dates,'M3',WAKE_H), wakeM:modeSlotD(dates,'M3',WAKE), dur:durAvgD(dates),
    gap:gapVal(dates), st:stOkD(dates), soto:sotoD(dates), move:moveDates(dates), stars:starsD(dates)}; }

  /* ---- 天気(Open-Meteo・無料/キー不要。取得できない時は「—」表示) ---- */
  function wxEmoji(c){ if(c==null) return '—'; if(c<=1) return '☀️'; if(c===2) return '⛅'; if(c===3) return '☁️';
    if(c>=45&&c<=48) return '🌫️'; if((c>=71&&c<=77)||c===85||c===86) return '❄️'; if(c>=95) return '⛈️'; return '🌧️'; }
  async function ensureWeather(dates){
    const need=dates.some(d=>S.weather[d]==null && d<=iso(today()));
    if(!need) return;
    try{
      const u='https://api.open-meteo.com/v1/forecast?latitude='+S.region.lat+'&longitude='+S.region.lon+
        '&daily=weathercode&past_days=14&forecast_days=1&timezone=Asia%2FTokyo';
      const r=await fetch(u); const j=await r.json();
      (j.daily&&j.daily.time||[]).forEach((t,i)=>{ S.weather[t]=j.daily.weathercode[i]; });
      save();
      dates.forEach((d,i)=>{ const el=document.getElementById('wx'+i); if(el) el.textContent=wxEmoji(S.weather[d]); });
    }catch(e){/* オフライン時は次回に再取得 */}
  }

  /* ============ エンジン:きょうの状態 ============ */
  function pending(){
    const t=today(), ti=iso(t), school=isSchool(t);
    const y=addDays(t,-1), yi=iso(y);
    const p={school, morning:!completed(ti,'m'), kaeri:school&&!completed(ti,'k'),
      att:false, holWake:false, catch:[], goalNeeded:false};
    if(isSchool(y)&&!completed(yi,'k')&&school) p.att=(ans(yi,'ATT')==null);
    if(!isSchool(y)&&!completed(yi,'m')) p.holWake=true;
    for(let n=1;n<=2;n++){ const d=iso(addDays(t,-n));
      if(!completed(d,'m')&&!completed(d,'c')) p.catch.push(d); }
    const wk=weekMonday(t);
    if(!S.goals[wk]){
      let rest=0; for(let n=0;n<7;n++){ const d=addDays(fromIso(wk),n); if(d>=new Date(t.getFullYear(),t.getMonth(),t.getDate())&&isSchool(d)) rest++; }
      p.goalNeeded=rest>=2||!school;
    }
    return p;
  }

  /* ============ がんばりスコア(score_config v2:割合方式)============
     「1週間の結果」を分かりやすく評価するための100点。週の途中から始めても
     低く見えないよう、点数は日ごとの加算ではなく「はじめてからの日ぶんの わりあい」で計算する。
     はんい = その週で最初に記録した日 〜 きょう(週が終わっていれば日曜)。
     ・きろく 60点 = はんいの日ぶん、記録できた日の わりあい ×60(まいにち記録=60)
     ・めあて 20点 = めあての しんちょく ×20(すすむほど 増える)
     ・せいかつ 20点 = 記録した日の うち、めやすを みたした わりあい(3項目の平均)×20(部分点)
     まとめて100点。週の途中は「いまの ちょうし」、日曜以降は「こんしゅうの けっか」。 */
  function score(mon){
    const ds=weekDates(mon), tISO=iso(today());
    let start=null; ds.forEach(d=>{ if(start==null&&(completed(d,'m')||completed(d,'k'))) start=d; });
    if(start==null) start=ds[0];
    const win=ds.filter(d=> d>=start && d<=tISO );
    const N=win.length||1;
    let rec=0; win.forEach(d=>{ const sch=isSchool(fromIso(d));
      if(completed(d,'m')&&(!sch||completed(d,'k'))) rec++; });
    const recPt=Math.round(60*rec/N);
    const g=S.goals[mon]; let goalPt=0;
    if(g){ const gd=GOALS.find(x=>x.code===g.code);
      if(gd.gapGoal){ goalPt=(gapOK(mon)===true)?20:0; }
      else{ const now=gd.judge(mon)||0, tgt=g.target||1; goalPt=Math.round(20*Math.min(1,now/tgt)); } }
    let sl=0,slo=0, st=0,sto=0, mv=0,mvo=0;
    win.forEach(d=>{ const b=ans(d,'M2'),w=ans(d,'M3');
      if(b!=null&&b!=='DK'&&w!=null&&w!=='DK'){ slo++; if(WAKE_H[w]+24-BED_H[b]>=9) sl++; }
      const g4=ans(d,'M4'); if(g4===1){ sto++; st++; }
      const sa=ans(d,'M4a'); if(sa!=null&&sa!=='DK'){ sto++; if(ST_H[sa]<=2) st++; }
      const m=ans(d,'M5'); if(m!=null&&m!=='DK'){ mvo++; if(m===0) mv++; } });
    const rates=[]; if(slo)rates.push(sl/slo); if(sto)rates.push(st/sto); if(mvo)rates.push(mv/mvo);
    const lifePt=rates.length?Math.round(20*rates.reduce((a,b)=>a+b,0)/rates.length):0;
    return {total:recPt+goalPt+lifePt, recPt, goalPt, lifePt, rec, N, done: tISO>=ds[6]};
  }

        (meter?'<div class="meter">'+meter+'</div>':'')+
        '<div style="font-size:13px;margin-top:6px">'+(g.achieved?'たっせい 🎉':(gd.gapGoal?'こんしゅうの きろくで はんてい するよ':'いま '+(got||0)+'日/'+g.target+'日'))+'</div></div>'; }
    app.innerHTML=
      '<h2>わたしの 1しゅうかん 📊</h2><div class="date">'+jdate(fromIso(mon))+' 〜</div>'+seg+
      '<h3>🌙 ねた じかん</h3><div class="card">'+
      (bedMode?'<div class="modeval">いちばん おおかったのは <b>'+bedMode+'</b></div>':'<div class="modeval">まだ きろくが ないよ</div>')+
      dayChart(bed,v=>(v-19)*24,hd,(21-19)*24,'めあて 9じ',[['9じ',48],['10じ',72],['11じ',96]])+
      '<div class="seechip">👀 ぼうが たかい日は、ねるのが おそかった日。まいにち そろっているかな？</div></div>'+
      '<h3>☀️ おきた じかん</h3><div class="card">'+
      dayChart(wake,v=>(v-5)*24,(v,i)=>'wk2'+(i>=5?' hd':''),null,null,[['6じ',24],['7じ',48],['8じ',72],['9じ',96]])+
      '<div class="seechip">👀 いろの うすい ぼう(休みの日)だけ たかく なっていないかな？</div></div>'+
      '<h3>⏳ ねていた ながさ</h3><div class="card">'+
      dayChart(dur,v=>Math.max(4,(v-6)*18),v=>v>=9?'good':'',54,'めやす 9じかん',[['8じかん',36],['10じかん',72]])+
      '<div class="seechip">👀 めやすは 9〜12じかん。みどりの ぼうは めやすに とどいた日。</div></div>'+
      '<h3>🔄 休みの日との ずれ</h3><div class="card">'+zureHtml+
      '<h3>🎮 あそびの ゲーム・どうがの じかん</h3><div class="card">'+
      dayChart(stv,v=>v*16+4,v=>v>=4?'over':'good',3*16+4,'めやす 2じかん',[['1じかん',36],['2じかん',52],['3じかん',68]])+
      '<div class="legend"><span class="lg-good">🟢 めやすの なか</span><span class="lg-bad">🔴 めやすを オーバー</span></div></div>'+
      '<h3>💪 あそんだ日と てんき</h3><div class="card"><div class="wgrid">'+
      '<span class="lab">てんき</span>'+ds.map((d,i)=>'<span class="wx" id="wx'+i+'">'+wxEmoji(S.weather[d])+'</span>').join('')+
      '<span class="lab">そとで あそんだ日</span>'+soto.map(v=>'<span class="st'+(v?'':' no')+'">'+(v==null?'・':'⭐')+'</span>').join('')+
      '<span class="lab">からだを うごかす あそびや うんどうを した日</span>'+mv.map(v=>'<span class="st'+(v?'':' no')+'">'+(v==null?'・':'⭐')+'</span>').join('')+
      '<span class="lab"></span>'+['げつ','か','すい','もく','きん','ど','にち'].map((d,i)=>'<span class="dy'+(i>=5?' hd':'')+'">'+d+'</span>').join('')+
      '</div><div class="seechip">👀 あめの日に そとで あそべなくても、なかで からだを うごかせたら ⭐！</div></div>'+
      '<h3>🏆 せんしゅうの けっか('+prange+')</h3>'+
      (prevHas?
        ('<div class="scorecard"><div><div class="pt">'+psc.total+'<small>てん</small></div><div style="font-size:11px;color:#4f7d3f">月〜日の けっか</div></div>'+
        '<div class="bd"><div><span>📝 きろくできた日</span><b>'+psc.rec+'/'+psc.N+'日</b></div>'+
        '<div><span>🎯 めあて</span><b>'+psc.goalPt+'/20</b></div>'+
        '<div><span>🌱 せいかつしゅうかん</span><b>'+psc.lifePt+'/20</b></div></div></div>')
        :('<div class="card" style="text-align:center;color:#8d887a;font-size:13px">せんしゅうの きろくが たまると<br>ここに 100てんまんてんの てんすうが でるよ</div>'))+
      '<div class="seechip">👀 てんすうは <b>せんしゅう(月〜日)の けっか</b>。げつようびに あたらしく なるよ(きろく60点＋めあて20点＋せいかつ20点)</div>'+
      goalHtml+
      '<div class="backrow"><button class="backbtn" id="back">← ホームへ</button></div>';
    bindWeekSeg();
    ensureWeather(ds);   /* 天気を裏で取得(取れたら表示を更新) */
    document.getElementById('back').onclick=()=>go('home');
  }
  function bindWeekSeg(){
    const n=document.getElementById('w-n'), h=document.getElementById('w-h'), m=document.getElementById('w-m');
    if(n) n.onclick=()=>renderWeek('now');
    if(h) h.onclick=()=>renderWeek('h');
    if(m) m.onclick=()=>renderWeek('m');
  }

  /* ============ めあて ============ */
  function renderGoal(){
    const mon=weekMonday(today()), g=S.goals[mon];
    const lastMon=weekMonday(addDays(fromIso(mon),-7));
    const lastBed=cntWeek(lastMon,'M2',a=>a<=3), lastSoto=sotoDays(lastMon), lastMove=cntWeek(lastMon,'M5',a=>a===0);
    app.innerHTML=
      '<h2>こんしゅうの めあて 🎯</h2>'+
      '<div class="gsec">📊 まずは せんしゅうを ふりかえろう</div>'+
      '<div class="lastcard"><div class="lastviz">'+
      '<div class="lv"><span class="i">🌙</span>9じまでに<br>ねた日<b>'+(lastBed||0)+'日</b></div>'+
      '<div class="lv"><span class="i">🌳</span>そとで<br>あそんだ日<b>'+(lastSoto||0)+'日</b></div>'+
      '<div class="lv"><span class="i">🏃</span>からだを<br>うごかした日<b>'+(lastMove||0)+'日</b></div>'+
      '</div></div>'+
      (g?('<div class="curgoal">いま えらんでいる めあて:<b>'+GOALS.find(x=>x.code===g.code).label+'</b></div>'):'')+
      '<div class="gpick">🎯 こんしゅう がんばる めあてを<br><b>ひとつ</b> えらんでね</div>'+
      '<div class="goalopts" id="gopts"></div>'+
      '<div class="backrow"><button class="backbtn" id="back">← ホームへ</button></div>';
    const box=document.getElementById('gopts');
    GOALS.forEach(gd=>{
      const prev={bed9:lastBed,soto:lastSoto,move:lastMove}[gd.code];
      const target=gd.gapGoal?null:Math.min(7,Math.max(DEFAULT_TARGET,(prev||0)+1)); /* 先週+1の段階制御(簡易) */
      const b=document.createElement('button'); b.className='goalopt';
      b.innerHTML='<span class="e">'+gd.e+'</span><span>'+gd.label+
        '<small>'+(gd.gapGoal?'ずれ 1じかん いないで たっせい':'こんしゅうは <b>週'+target+'日</b> できたら たっせい！')+'</small></span>';
      b.onclick=()=>{ S.goals[mon]={code:gd.code,target:target||0,setAt:new Date().toISOString()};
        ev({t:'goal',code:gd.code,target:target||0,week:mon});
        app.innerHTML='<div class="done"><div class="big">🎯</div><h3>めあてが きまったよ！</h3>'+
          '<p>'+gd.label+'</p><span class="stampcard">こんしゅう がんばろう！</span>'+HOMEBTN+'</div>';
        bindHome(); };
      box.appendChild(b);
    });
    document.getElementById('back').onclick=()=>go('home');
  }

  /* ============ データ管理(大人向け) ============ */
  /* ⚙️は大人用パスコードで保護(初期値1122・⚙️内で変更可)。アプリを開き直すたびに再入力 */
  let adultOK=false;
  function renderPin(){
    app.className='app';
    app.innerHTML='<div style="margin:auto 0;text-align:center"><div style="font-size:44px">🔒</div>'+
      '<h2>おとなの ページ</h2>'+
      '<p style="color:#8d887a;font-size:13px">せんせい・おうちのひと・がくせいの ひとが つかう ページです<br>パスコードを 入れてください</p>'+
      '<input type="text" id="pin" inputmode="numeric" autocomplete="off" style="text-align:center;letter-spacing:8px;font-size:22px" placeholder="****">'+
      '<div id="pmsg" style="color:#c2410c;font-size:12px;min-height:20px;margin-top:6px"></div>'+
      '<button class="feedbtn" id="pok">ひらく</button></div>'+
      '<div class="backrow"><button class="backbtn" id="back">← ホームへ もどる</button></div>';
    document.getElementById('pok').onclick=()=>{
      if(document.getElementById('pin').value===S.pin){ adultOK=true; go('data'); }
      else document.getElementById('pmsg').textContent='ちがうみたい。おとなの ひとに きいてね';
    };
    document.getElementById('back').onclick=()=>go('home');
  }
  function renderData(){
    if(!adultOK){ renderPin(); return; }
    if(!S.server.child){ S.server.child='c'+Math.random().toString(36).slice(2,10); save(); }  /* 既存利用者にも仮名IDを補完 */
    const rows=S.events.slice(-30).reverse().map(e=>'<tr><td>'+(e.at||'').slice(5,16).replace('T',' ')+'</td><td>'+e.t+'</td><td>'+(e.d||'')+'</td><td>'+(e.q||e.to||e.code||'')+'</td><td>'+(e.a!==undefined?e.a:(e.n||''))+'</td><td>'+(e.sy?'済':'未')+'</td></tr>').join('');
    app.innerHTML='<div class="adult"><h2>⚙️ データ管理(大人向け)</h2>'+
      '<div class="a-sec"><h4>🌐 サーバ同期(設定しなければ端末内のみ)</h4>'+
      '<div style="margin-bottom:6px"><input type="text" id="svurl" placeholder="api.phpのURL(例 https://xxx.sakura.ne.jp/kiroku/api.php)" value="'+(S.server.url||'')+'"></div>'+
      '<div style="margin-bottom:6px"><input type="text" id="svtoken" placeholder="トークン(config.phpで決めた文字列)" value="'+(S.server.token||'')+'"></div>'+
      '<div style="font-size:11px;color:#8d887a">仮名ID:'+(S.server.child||'(初回送信時に自動生成)')+' / 未送信:'+unsynced().length+'件'+(syncMsg?(' / '+syncMsg):'')+'</div>'+
      '<div style="font-size:11px;color:#8d887a">※サーバに送るのは仮名IDと回答だけ。<b>なまえは送信されません</b></div>'+
      '<button class="a-cta" id="svsave">設定を保存して いま送信</button></div>'+
      '<div class="a-sec"><h4>状態</h4><div>なまえ:'+(S.name||'未設定')+' / イベント数:'+S.events.length+' / コイン:'+S.coins+' / なかま:'+S.owned.length+'</div>'+
      '<div style="margin-top:6px"><input type="text" id="nm" placeholder="なまえ(ひらがな)" value="'+(S.name||'')+'"></div>'+
      '<div style="margin-top:6px"><input type="text" id="pin2" inputmode="numeric" placeholder="おとな用パスコードを変える(現在:'+S.pin+')"></div>'+
      '<button class="a-cta" id="svnm">保存</button></div>'+
      '<div class="a-sec"><h4>エクスポート(研究用・回収)</h4>'+
      '<button class="a-cta" id="exs">📤 CSVを共有(AirDrop・ドライブ等)</button>'+
      '<button class="a-cta" id="exc">💾 CSVをダウンロード(端末に保存)</button>'+
      '<button class="a-cta" id="excp">📋 CSVをコピー(貼り付け回収用)</button>'+
      '<button class="a-cta" id="exj">JSONをダウンロード(全イベント)</button>'+
      '<div class="a-note">列の意味は「データ辞書(コードブック)」を参照。おぼえてない=DK。iPadでは「共有」→AirDropで学生の端末へ直接送るのが最速です。</div></div>'+
      '<div class="a-sec"><h4>⚠️ デモ・初期化(本番の端末では触らない)</h4>'+
      '<button class="a-cta" id="demo">過去14日ぶんのデモデータを生成</button>'+
      '<div class="a-note">画面の見え方を確認するための「架空の」記録を作るボタンです。本物の記録に混ざるため、児童が使う端末では絶対に押さないでください(押してしまった場合は全削除→再セットアップ)。</div>'+
      '<button class="a-cta red" id="wipe">全データを削除</button></div>'+
      '<div class="a-sec"><h4>直近のイベント(30件)</h4><div style="overflow-x:auto"><table class="evtable"><tr><th>時刻</th><th>種別</th><th>対象日</th><th>Q</th><th>値</th><th>送信</th></tr>'+rows+'</table></div></div>'+
      '<button class="a-cta gray" id="back">← ホームへ</button></div>';
    document.getElementById('back').onclick=()=>go('home');
    document.getElementById('svsave').onclick=async()=>{
      S.server.url=document.getElementById('svurl').value.trim();
      S.server.token=document.getElementById('svtoken').value.trim();
      save(); await syncNow(); go('data'); };
    document.getElementById('svnm').onclick=()=>{
      S.name=document.getElementById('nm').value.trim(); S.setup=true;
      const p2=document.getElementById('pin2').value.trim(); if(p2) S.pin=p2;
      save(); go('home'); };
    const pid=S.server.child||'noid', stamp=iso(today());
    const makeCsv=()=>{
      const head='child,target_date,session,question_id,question_version,answer,latency_ms,input_at\n';
      return head+S.events.filter(e=>e.t==='ans').map(e=>[pid,e.d,e.s,e.q,e.v,e.a,e.lat||'',e.at].join(',')).join('\n');
    };
    const fname='kiroku_'+pid+'_'+stamp;
    document.getElementById('exj').onclick=()=>dl(fname+'.json',
      JSON.stringify({child:pid, exported_at:new Date().toISOString(), events:S.events},null,1),'application/json');
    document.getElementById('exc').onclick=()=>dl(fname+'.csv','﻿'+makeCsv(),'text/csv');
    document.getElementById('exs').onclick=async()=>{
      const f=new File(['﻿'+makeCsv()], fname+'.csv', {type:'text/csv'});
      if(navigator.canShare && navigator.canShare({files:[f]})){
        try{ await navigator.share({files:[f], title:fname}); }catch(e){/* キャンセル */}
      } else alert('この端末は共有ボタンに対応していません。「ダウンロード」か「コピー」を使ってください');
    };
    document.getElementById('excp').onclick=async()=>{
      try{ await navigator.clipboard.writeText(makeCsv()); alert('コピーしました。回収用フォームやメモに貼り付けてください'); }
      catch(e){ alert('コピーできませんでした。「ダウンロード」を使ってください'); } };
    document.getElementById('demo').onclick=()=>{ genDemo(); alert('デモデータを生成しました'); go('home'); };
    document.getElementById('wipe').onclick=()=>{ if(confirm('本当に全データを削除しますか？(元に戻せません)')){ S={name:S.name,setup:true,events:[],stars:0,goals:{},overrides:{}}; save(); go('home'); } };
  }
  function dl(name,content,type){
    const a=document.createElement('a');
    a.href=URL.createObjectURL(new Blob([content],{type})); a.download=name; a.click();
    setTimeout(()=>URL.revokeObjectURL(a.href),2000);
  }
  function genDemo(){
    const r=n=>Math.floor(Math.random()*n);
    for(let n=14;n>=1;n--){
      const d=addDays(today(),-n), di=iso(d), sch=isSchool(d);
      if(Math.random()<0.12) continue;   /* たまに未入力日 */
      const bed=sch?3+r(3):4+r(4), wk=sch?2+r(3):4+r(4);
      [['M1',r(10)<8?0:1],['M2',bed],['M3',wk],['M4',r(10)<8?0:1]].forEach(x=>ev({t:'ans',d:di,s:'m',q:x[0],v:QV,a:x[1],lat:800+r(2000)}));
      if(ans(di,'M4')===0) ev({t:'ans',d:di,s:'m',q:'M4a',v:QV,a:1+r(3),lat:900});
      const pa=r(10)<7?0:1; ev({t:'ans',d:di,s:'m',q:'M5',v:QV,a:pa,lat:700});
      if(pa===0){ ev({t:'ans',d:di,s:'m',q:'M5a',v:QV,a:r(3),lat:700}); ev({t:'ans',d:di,s:'m',q:'M5b',v:QV,a:1+r(3),lat:700});
        const c=r(4); ev({t:'ans',d:di,s:'m',q:'M5c',v:QV,a:c,lat:700}); if(c===1) ev({t:'ans',d:di,s:'m',q:'M5d',v:QV,a:r(3),lat:600}); }
      ev({t:'ans',d:di,s:'m',q:'M6',v:QV,a:r(10)<3?0:1,lat:600});
      ev({t:'ans',d:di,s:'m',q:'G1OUT',v:QV,a:pa,lat:600});   /* 1年生:そとで あそんだ(=運動ありと同じ) */
      ev({t:'complete',s:'m',d:di});
      if(G1){ S.care[S.buddy]=(S.care[S.buddy]||0)+1; } else { S.coins+=COIN_PER_REC; ev({t:'coin',n:COIN_PER_REC}); }
      if(sch){
        ev({t:'ans',d:di,s:'k',q:'K1',v:QV,a:r(3),lat:700});
        const k2=r(10)<5?0:1; ev({t:'ans',d:di,s:'k',q:'K2',v:QV,a:k2,lat:700});
        if(k2===0) ev({t:'ans',d:di,s:'k',q:'K2a',v:QV,a:r(4),lat:700});
        else { ev({t:'ans',d:di,s:'k',q:'K2b',v:QV,a:r(4),lat:700}); ev({t:'ans',d:di,s:'k',q:'K2c',v:QV,a:r(5),lat:700}); }
        const w=r(3); ev({t:'ans',d:di,s:'k',q:'K3',v:QV,a:w,lat:600}); if(w===1) ev({t:'ans',d:di,s:'k',q:'K3a',v:QV,a:r(3),lat:600});
        ev({t:'complete',s:'k',d:di});
        if(G1){ S.care[S.buddy]=(S.care[S.buddy]||0)+1; } else { S.coins+=COIN_PER_REC; ev({t:'coin',n:COIN_PER_REC}); }
      }
    }
    if(!G1){ S.care[S.buddy]=(S.care[S.buddy]||0)+7; }   /* デモ:バディを少し育てた状態に */
    save();
  }

  /* ============ 初回セットアップ ============ */
  function renderSetup(){
    app.innerHTML='<div style="margin:auto 0;text-align:center">'+
      '<div style="font-size:52px">🌱</div><h2>まいにち きろく</h2>'+
      '<div class="gradebadge" style="position:static;display:inline-block;margin:4px 0">'+GRADES[GRADE]+'よう</div>'+
      '<p style="color:#8d887a;font-size:13px">プロトタイプ版・データはこの端末の中だけに保存されます</p>'+
      '<div style="text-align:left;margin:16px 0 8px;font-weight:700">なまえを おしえてね</div>'+
      '<input type="text" id="nm" placeholder="ひらがなで にゅうりょく">'+
      '<button class="feedbtn" id="ok" style="margin-top:16px">はじめる！</button></div>';
    document.getElementById('ok').onclick=()=>{
      const v=document.getElementById('nm').value.trim();
      if(!v){ document.getElementById('nm').focus(); return; }
      S.name=v; S.setup=true;
      if(!S.server.child) S.server.child='c'+Math.random().toString(36).slice(2,10);  /* 端末の仮名IDを初回に発行 */
      save(); go('home'); };
  }

  function render(){
    tick();
    if(!S.setup){ renderSetup(); return; }
    switch(scr.name){
      case 'home': renderHome(); break;
      case 'flow': renderFlow(); break;
      case 'week': renderWeek(); break;
      case 'goal': renderGoal(); break;
      case 'gacha': renderGacha(); break;
      case 'nakama': renderNakama(); break;
      case 'shop': renderShop(); break;
      case 'data': renderData(); break;
      default: renderHome();
    }
  }
  /* 回収モード:URLの最後に #kaishu を付けて開くと⚙️(エクスポート)画面へ直行 */
  if(/kaishu|data/.test(location.hash)) scr={name:'data'};   /* #kaishu / #g23?kaishu 等で回収画面へ */
  render();
})();
</script>
